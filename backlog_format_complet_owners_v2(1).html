function inferTwig(method, controllerPath){
  const nsMap = {
    "Auth/AuthController":"auth",
    "UsersAvis/UserController":"",
    "UsersAvis/AvisController":"front/avis",
    "Admin/AdminController":"back/user",
    "Admin/FormationController":"back/elearning/formation",
    "Admin/ParticipationController":"back/elearning/participation",
    "Front/FormationController":"front/elearning/formations",
    "Marketplace/ProduitController":"front/marketplace/produits",
    "Marketplace/CommandeController":"front/marketplace/commandes",
    "Marketplace/TrackingController":"front/marketplace/tracking",
    "Marketplace/PaymentController":"front/marketplace/payment",
    "Marketplace/FactureController":"front/marketplace/facture",
    "Marketplace/MarketAnalysisController":"front/marketplace/market_analysis",
    "Marketplace/StatisticsController":"front/marketplace/statistics",
    "Investissement/FrontProjetController":"front/projet",
    "Investissement/FrontInvestissementController":"front/investissement",
    "Investissement/InvestissementApiController":"front/investissement",
    "Investissement/DealController":"front/deal",
    "Investissement/NegociationController":"front/negociation",
    "Investissement/DashboardInvestisseurController":"front/dashboard",
    "Community/PostController":"front/community",
    "Community/CommentaireController":"front/community",
    "Ai/AiAssistantController":"front/ai",
  };
  const parts = controllerPath.split("/");
  const ns = parts.slice(2, parts.length - 1).join("/");
  const base = nsMap[ns] || ns.toLowerCase();
  const tplName = method.replace(/([A-Z])/g, '_$1').replace(/^_/, '').toLowerCase() + ".html.twig";
  return base ? base + "/" + tplName : tplName;
}

function buildLayers(taskPaths){
  const paths = taskPaths.filter(p => p.trim());
  const envs = [];
  let ctrlPath = null, ctrlMethod = "", ctrlFile = "";
  let svcPath = null, svcMethod = "", svcFile = "";

  paths.forEach(p => {
    if(p.startsWith(".env:")){
      envs.push(p.replace(".env:", "").trim());
      return;
    }
    const arrowIdx = p.indexOf("→");
    if(arrowIdx === -1) return;
    const before = p.substring(0, arrowIdx).trim();
    const after = p.substring(arrowIdx + 2).trim();
    const method = after.replace(/\(l\.\d+\)/, "").trim();
    const file = before.split("/").pop();
    if(before.includes("/Controller/") && !ctrlPath){
      ctrlPath = before; ctrlMethod = method; ctrlFile = file;
    } else if(before.includes("/Service/") && !svcPath){
      svcPath = before; svcMethod = method; svcFile = file;
    } else if(before.includes("/Controller/") && !svcPath){
      svcPath = before; svcMethod = method; svcFile = file;
    }
  });

  if(!svcPath && ctrlPath){
    const parts = ctrlPath.split("/");
    const ns = parts.slice(2, parts.length - 1).join("/");
    const ctrlFileRaw = parts[parts.length - 1];
    const svcNs = ns.replace("/Controller/", "/Service/");
    const svcClassRaw = ctrlFileRaw.replace("Controller.php", "Service.php");
    svcPath = "src/" + svcNs + "/" + svcClassRaw;
    svcMethod = ctrlMethod; svcFile = svcClassRaw;
  }

  return {
    ctrl:{m:ctrlMethod, f:ctrlFile, tpl:ctrlPath ? inferTwig(ctrlMethod, ctrlPath) : ""},
    svc:{m:svcMethod, f:svcFile, tpl:ctrlPath ? inferTwig(svcMethod, ctrlPath) : ""},
    envs
  };
}

let active="all";

function chip(m, f, extra){
  return `<span class="path-chip"><span class="method">${m}</span><span class="sep"> – </span><span class="file">${f}</span>${extra||""}</span>`;
}
function chipTwig(t){
  return `<span class="path-chip is-twig"><span class="tpl">${t}</span></span>`;
}
function chipEnv(v){
  return ` <span class="path-chip is-env"><span class="method">${v}</span></span>`;
}

function render(){
  const tbody=document.getElementById("tbody");
  tbody.innerHTML="";
  const filtered=data.filter(r=>active==="all"||r.sprint===active);
  filtered.forEach((us, usIdx)=>{
    const bg=sprintColors[us.sprint];
    const totalRows=us.tasks.length*3;
    us.tasks.forEach((t, ti)=>{
      const layers=buildLayers(t.paths);

      const tr0=document.createElement("tr");
      if(ti===0){
        tr0.innerHTML=
          `<td class="cell-sprint ${bg}" rowspan="${totalRows}">Sprint ${us.sprint}</td>`+
          `<td class="cell-us ${bg}" rowspan="${totalRows}">${us.us}</td>`+
          `<td class="${bg}" rowspan="3">${t.desc}</td>`+
          `<td class="cell-couche couche-ctrl ${bg} l1">Contrôleur</td>`+
          `<td class="${bg} l1">${chip(layers.ctrl.m, layers.ctrl.f, "")}${layers.envs.length ? chipEnv(layers.envs.join(", ")) : ""}</td>`;
      } else {
        tr0.innerHTML=
          `<td class="${bg}" rowspan="3">${t.desc}</td>`+
          `<td class="cell-couche couche-ctrl ${bg} l1">Contrôleur</td>`+
          `<td class="${bg} l1">${chip(layers.ctrl.m, layers.ctrl.f, "")}${layers.envs.length ? chipEnv(layers.envs.join(", ")) : ""}</td>`;
      }
      tbody.appendChild(tr0);

      const tr1=document.createElement("tr");
      tr1.innerHTML=
        `<td class="cell-couche couche-svc ${bg} l2">Logique métier</td>`+
        `<td class="${bg} l2">${chip(layers.svc.m, layers.svc.f, "")}</td>`;
      tbody.appendChild(tr1);

      const tr2=document.createElement("tr");
      tr2.innerHTML=
        `<td class="cell-couche couche-twig ${bg} l3">Interface HTML</td>`+
        `<td class="${bg} l3">${chipTwig(layers.ctrl.tpl)}</td>`;
      tbody.appendChild(tr2);
    });
  });
}

function filter(btn){
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  active=btn.dataset.sprint;
  render();
}

function exportPNG(){
  const btn=document.querySelector(".export-btn");
  btn.textContent="Export en cours…";
  btn.disabled=true;
  html2canvas(document.getElementById("capture"),{backgroundColor:"#ffffff",scale:2,useCORS:true,logging:false}).then(canvas=>{
    const a=document.createElement("a");
    a.download="backlog-complet.png";
    a.href=canvas.toDataURL("image/png");
    a.click();
    btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 2v8M5 7l3 3 3-3M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1"/></svg> Exporter PNG`;
    btn.disabled=false;
  });
}

render();
</script>
