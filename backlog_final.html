function getTwig(ctrlFile,method){
  const key=ctrlFile+"::"+method;
  if(twigMap[key])return twigMap[key];
  // Fallback: generate plausible template path based on controller namespace
  const nsFolders={
    "UsersAvis":"front/avis",
    "Admin":"back",
    "Marketplace":"front/Marketplace",
    "Elearning":"front/elearning",
    "Investissement":"front/investissement",
    "Community":"front/community",
    "Ai":"front/ai",
  };
  const ns=ctrlFile.split("/")[0]||"front";
  const folder=nsFolders[ns]||"front";
  return folder+"/"+method.toLowerCase().replace(/([A-Z])/g,"_$1").replace(/^_/,"")+".html.twig";
}

function buildLayers(paths){
  const ps=paths.filter(p=>p.trim());
  let ctrlPath="",ctrlMethod="",ctrlFile="";
  let svcPath="",svcMethod="",svcFile="";
  const envs=[];

  ps.forEach(p=>{
    if(p.startsWith(".env:")){
      envs.push(p.replace(".env:",""));
      return;
    }
    const arrowIdx=p.indexOf("→");
    if(arrowIdx===-1)return;
    const before=p.substring(0,arrowIdx).trim();
    const after=p.substring(arrowIdx+2).trim();
    const method=after.replace(/\(l\.\d+\)/,"").trim().replace(/\(\)$/,"");
    if(method==="page")method="index";
    const file=before.split("/").pop();

    if(before.includes("/Controller/")){
      ctrlPath=before;
      ctrlMethod=method;
      const parts=before.split("/");
      ctrlFile=parts[parts.length-1].replace(".php","");
    }else if(before.includes("/Service/")){
      svcPath=before;
      svcMethod=method;
      svcFile=file;
    }
  });

  if(!svcPath&&ctrlPath){
    const parts=ctrlPath.split("/");
    const ns=parts.slice(2,parts.length-1).join("/");
    const ctrlFileRaw=parts[parts.length-1];
    const svcNs=ns.replace("/Controller/","/Service/");
    const svcClassRaw=ctrlFileRaw.replace("Controller.php","Service.php");
    svcPath="src/"+svcNs+"/"+svcClassRaw;
    svcMethod=ctrlMethod;
    svcFile=svcClassRaw;
  }

  const twig=getTwig(ctrlFile,ctrlMethod);

  return{
    ctrl:{m:ctrlMethod,f:ctrlFile,twig:twig},
    svc:{m:svcMethod,f:svcFile},
    envs
  };
}

let active="all";

function chip(m,f){return`<span class="chip"><span class="method">${m}()</span><span class="sep">–</span><span class="file">${f}</span></span>`;}
function chipTwig(t){return`<span class="chip chip-twig"><span class="tpl">${t}</span></span>`;}
function chipEnv(v){return`<span class="chip chip-env"><span class="env-key">${v}</span></span>`;}

function render(){
  const tbody=document.getElementById("tbody");
  tbody.innerHTML="";
  const filtered=data.filter(r=>active==="all"||r.sprint===active);
  filtered.forEach(us=>{
    us.tasks.forEach(t=>{
      const layers=buildLayers(t.paths);
      const usText=us.us;

      const tr0=document.createElement("tr");
      tr0.innerHTML=`<td class="cell-us">${usText}</td><td class="cell-task">${t.desc}</td><td class="cell-detail">${chip(layers.ctrl.m,layers.ctrl.f)}${layers.envs.length?chipEnv(layers.envs.join(", ")):""}</td>`;
      tbody.appendChild(tr0);

      const tr1=document.createElement("tr");
      tr1.innerHTML=`<td class="cell-us">${usText}</td><td class="cell-task">${t.desc}</td><td class="cell-detail">${chip(layers.svc.m,layers.svc.f)}</td>`;
      tbody.appendChild(tr1);

      const tr2=document.createElement("tr");
      tr2.innerHTML=`<td class="cell-us">${usText}</td><td class="cell-task">${t.desc}</td><td class="cell-detail">${chipTwig(layers.ctrl.twig)}</td>`;
      tbody.appendChild(tr2);
    });
  });
}

function filter(btn){
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  active=btn.dataset.sprint;
  render();
}

document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.addEventListener("click",()=>filter(btn));
});

function exportPNG(){
  const btn=document.querySelector(".export-btn");
  btn.textContent="Export en cours…";
  btn.disabled=true;
  html2canvas(document.getElementById("capture"),{backgroundColor:"#ffffff",scale:2,useCORS:true,logging:false}).then(canvas=>{
    const a=document.createElement("a");
    a.download="backlog-final.png";
    a.href=canvas.toDataURL("image/png");
    a.click();
    btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 2v8M5 7l3 3 3-3M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1"/></svg> Exporter PNG`;
    btn.disabled=false;
  });
}

render();
